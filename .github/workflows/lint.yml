name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -e SC1091 -x
        with:
          severity: warning
          scandir: '.'
          ignore_names: .zshrc

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n on every shell script
        run: |
          set -e
          find . -type f \( -name '*.sh' -o -name 'install.sh' \) \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -print0 | xargs -0 -I{} bash -n {}

  brewfile-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Brewfile parses with brew bundle
        run: |
          # `brew bundle list` walks the Brewfile through Homebrew's own parser
          # (which knows about the `tap`/`brew`/`cask`/`mas`/`vscode` DSL methods).
          # Plain `ruby -e "eval(...)"` does NOT, because those methods are only
          # defined inside the Homebrew bundler context.
          brew bundle list --file=Brewfile > /dev/null
